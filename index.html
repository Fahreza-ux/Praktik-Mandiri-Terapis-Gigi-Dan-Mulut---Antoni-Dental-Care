<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baitussayam Dental Care</title>
    <style>
        /* CSS Ditaruh Langsung di Sini agar Tidak Berantakan */
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background: #f5f8fa; color: #333; line-height: 1.6; width: 100%; overflow-x: hidden; }
        
        /* Header & Logo */
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo img { height: 80px; width: auto; }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        nav a { text-decoration: none; color: #0b2b5a; font-weight: bold; font-size: 12px; }

        /* Banner */
        .banner { width: 100%; height: 250px; background: #0b2b5a; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        
        /* Lokasi Grid */
        .section { padding: 30px 15px; text-align: center; }
        .card { background: white; border-radius: 10px; padding: 20px; margin: 10px auto; max-width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .btn-wa { display: block; background: #25d366; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="logo.jpg" alt="Logo"></div>
        <nav>
            <ul>
                <li><a href="#beranda">Beranda</a></li>
                <li><a href="#lokasi">Lokasi</a></li>
                <li><a href="#layanan">Layanan</a></li>
            </ul>
        </nav>
    </header>

    <section class="banner" id="beranda">
        <div>
            <h1>Baitussayam Dental Care</h1>
            <p>Klinik Gigi Pilihan Keluarga</p>
        </div>
    </section>

    <section class="section" id="lokasi">
        <h2>Lokasi Kami</h2>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=500">
            <h3>Pusat</h3>
            <p>Jl. Utama No. 123</p>
            <a href="#" class="btn-wa">Chat WA</a>
        </div>
    </section>

</body>
</html>
