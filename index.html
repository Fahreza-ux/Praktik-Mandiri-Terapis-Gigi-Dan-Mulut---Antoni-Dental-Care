<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baitussayam Dental Care</title>
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo"><img src="logo.jpg" alt="Logo"></div>
            <ul class="nav-links">
                <li><a href="#beranda">Beranda</a></li>
                <li><a href="#lokasi">Lokasi</a></li>
                <li><a href="#layanan">Layanan</a></li>
            </ul>
        </nav>
    </header>

    <section id="beranda" class="slider-container">
        <div class="mySlides fade"><img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=1200"><div class="text-overlay"><h1>Klinik Gigi Keluarga</h1><a href="#lokasi" class="btn-primary">Cari Klinik</a></div></div>
        <div class="mySlides fade"><img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=1200"><div class="text-overlay"><h1>Pelayanan Amanah</h1><a href="#lokasi" class="btn-primary">Cari Klinik</a></div></div>
    </section>

    <section id="lokasi" class="location-section">
        <h2 class="section-title">Lokasi Kami</h2>
        <div class="location-grid">
            <div class="location-card">
                <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=500">
                <div class="card-body"><h3>Pusat</h3><p>Jl. Utama No. 123</p><a href="#" class="btn-wa">Hubungi WA</a></div>
            </div>
            <div class="location-card">
                <img src="https://images.unsplash.com/photo-1513475382585-d06e58bc0e05?w=500">
                <div class="card-body"><h3>Bintaro</h3><p>Jl. Bintaro Utama</p><a href="#" class="btn-wa">Hubungi WA</a></div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/628XXXXXXXXXX" class="floating-whatsapp" target="_blank">Chat Admin</a>

    <script>
        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("mySlides");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 4000);
        }
        showSlides();
    </script>
</body>
</html>
