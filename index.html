<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baitussayam Dental Care</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><img src="logo.jpg" alt="Logo"></div>
            <ul>
                <li><a href="#beranda">Home</a></li>
                <li><a href="#layanan">Layanan</a></li>
                <li><a href="#kontak">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <!-- Slider Section -->
    <section id="beranda" class="slider-container">
        <div class="mySlides fade">
            <img src="https://images.unsplash.com/photo-1588776814546-1ff5372bf9a7?w=1200" style="width:100%">
            <div class="text-overlay"><h1>Klinik Gigi Profesional</h1></div>
        </div>
        <div class="mySlides fade">
            <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=1200" style="width:100%">
            <div class="text-overlay"><h1>Pelayanan Islami & Amanah</h1></div>
        </div>
    </section>

    <!-- Script Slider -->
    <script>
        let slideIndex = 0;
        showSlides();
        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1 }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 4000); // Ganti slide setiap 4 detik
        }
    </script>
